# Activated: March 29, 2026
name: Daily Weather Report
# Scheduled 1 hour early to compensate for GitHub Actions delays
# Auto-commits daily to prevent cache staleness

on:
  schedule:
    - cron: '0 13 * * *'
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: sports-weather-state-${{ github.ref }}
  cancel-in-progress: false

jobs:
  post-weather:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check if already ran today
        id: check_already_ran
        run: |
          TODAY=$(TZ='America/Los_Angeles' date +%Y-%m-%d)
          if [ -f last_weather_run.txt ]; then
            LAST_RUN=$(cat last_weather_run.txt)
            if [ "$LAST_RUN" = "$TODAY" ]; then
              echo "already_ran=true" >> "$GITHUB_OUTPUT"
              echo "⏭️  Already posted daily report today - skipping"
            else
              echo "already_ran=false" >> "$GITHUB_OUTPUT"
              echo "✅ First run today - proceeding"
            fi
          else
            echo "already_ran=false" >> "$GITHUB_OUTPUT"
            echo "✅ First run - proceeding"
          fi

      - name: Update game schedule
        if: steps.check_already_ran.outputs.already_ran == 'false'
        run: python update_schedule.py

      - name: Run weather bot
        id: run_weather_bot
        if: steps.check_already_ran.outputs.already_ran == 'false'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python weather_bot.py

      - name: Mark as ran today
        if: steps.check_already_ran.outputs.already_ran == 'false' && steps.run_weather_bot.outcome == 'success'
        run: |
          TODAY=$(TZ='America/Los_Angeles' date +%Y-%m-%d)
          echo "$TODAY" > last_weather_run.txt
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add last_weather_run.txt
          git commit -m "🔒 Mark weather report as ran [skip ci]" || true
          git pull --rebase origin main || git rebase --abort || true
          git push || echo "⚠️ WARNING: Could not save run marker"

      - name: Keep workflow active (prevent cache staleness)
        if: steps.check_already_ran.outputs.already_ran == 'false' && steps.run_weather_bot.outcome == 'success'
        run: |
          mkdir -p .github
          echo "Last run: $(TZ='America/Los_Angeles' date '+%Y-%m-%d %H:%M:%S %Z')" > .github/.weather-keep-alive

      - name: Commit run tracking, analytics, and keep-alive
        if: steps.check_already_ran.outputs.already_ran == 'false' && steps.run_weather_bot.outcome == 'success'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .github/.weather-keep-alive || true
          git add analytics.json ANALYTICS.md 2>/dev/null || true
          git add STATUS.md || true
          git add config.json || true
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "📊 Update analytics and tracking [skip ci]" || true
          fi
          git pull --rebase origin main || git rebase --abort || true
          git push --force-with-lease || echo "⚠️ WARNING: Push failed — analytics may not persist"

      - name: Log skipped run (already ran today)
        if: steps.check_already_ran.outputs.already_ran == 'true'
        run: python -c "from analytics import log_workflow_run; log_workflow_run('skipped')"
