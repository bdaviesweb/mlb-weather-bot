name: High Risk Weather Alerts
# Scheduled 1 hour early to compensate for GitHub Actions delays
# Auto-commits daily to prevent cache staleness

on:
  schedule:
    - cron: '0 16 * * *'
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  high-risk-alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check if already ran today
        id: check_already_ran
        run: |
          TODAY=$(TZ='America/Los_Angeles' date +%Y-%m-%d)
          if [ -f last_high_risk_run.txt ]; then
            LAST_RUN=$(cat last_high_risk_run.txt)
            if [ "$LAST_RUN" = "$TODAY" ]; then
              echo "already_ran=true" >> $GITHUB_OUTPUT
              echo "⏭️  Already posted high-risk alert today - skipping"
            else
              echo "already_ran=false" >> $GITHUB_OUTPUT
              echo "✅ First run today - proceeding"
            fi
          else
            echo "already_ran=false" >> $GITHUB_OUTPUT
            echo "✅ First run - proceeding"
          fi

      - name: Update game schedule
        if: steps.check_already_ran.outputs.already_ran == 'false'
        run: python update_schedule.py

      - name: Send High-risk alerts
        if: steps.check_already_ran.outputs.already_ran == 'false'
        env:
          HIGH_RISK_WEBHOOK_URL: ${{ secrets.HIGH_RISK_WEBHOOK_URL }}
        run: python high_risk_alert.py

      - name: Mark as ran today
        if: steps.check_already_ran.outputs.already_ran == 'false'
        run: |
          TODAY=$(TZ='America/Los_Angeles' date +%Y-%m-%d)
          echo "$TODAY" > last_high_risk_run.txt

      - name: Keep workflow active
        if: steps.check_already_ran.outputs.already_ran == 'false'
        run: |
          mkdir -p .github
          echo "Last run: $(TZ='America/Los_Angeles' date '+%Y-%m-%d %H:%M:%S %Z')" > .github/.highrisk-keep-alive

      - name: Commit tracking, analytics, and keep-alive
        if: steps.check_already_ran.outputs.already_ran == 'false'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add last_high_risk_run.txt .github/.highrisk-keep-alive || true
          git add analytics.json ANALYTICS.md 2>/dev/null || true
          git add STATUS.md || true
          git add high_risk_predictions.json || true
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "📊 Update analytics and tracking [skip ci]"
          git pull --rebase origin main || true
          git push || echo "⚠️ WARNING: Push failed — dedup file may not persist"

      - name: Log skipped run (already ran today)
        if: steps.check_already_ran.outputs.already_ran == 'true'
        run: python -c "from analytics import log_workflow_run; log_workflow_run('skipped')"

      - name: Commit analytics for skipped run
        if: steps.check_already_ran.outputs.already_ran == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add analytics.json ANALYTICS.md 2>/dev/null || true
          git add STATUS.md || true
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "📊 Update analytics (skipped run) [skip ci]"
          git pull --rebase origin main || true
          git push || echo "⚠️ WARNING: Push failed — skipped run analytics may not persist"
