name: MLB Game Status Monitor

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  monitor-status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Pull latest state from repo
        run: |
          git pull --rebase origin main || true
          echo "📂 Current game_states.json:"
          cat game_states.json 2>/dev/null || echo "(no state file yet)"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests pytz

      - name: Check if game monitoring hours (10 AM - 10 PM PT)
        id: check_time
        run: |
          HOUR=$(TZ='America/Los_Angeles' date +%H)
          if [ "$HOUR" -ge "10" ] && [ "$HOUR" -le "22" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "✅ Game hours ($HOUR:00 PT) - monitoring"
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "⏭️ Outside game hours ($HOUR:00 PT) - skipping"
          fi

      - name: Monitor MLB game status
        if: steps.check_time.outputs.should_run == 'true'
        env:
          HIGH_RISK_WEBHOOK_URL: ${{ secrets.HIGH_RISK_WEBHOOK_URL }}
        run: python mlb_game_status_monitor.py

      - name: Log skipped run outside game hours
        if: steps.check_time.outputs.should_run == 'false'
        run: python -c "from analytics import log_workflow_run; log_workflow_run('skipped')"

      - name: Commit game state tracking and analytics
        if: steps.check_time.outputs.should_run == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add game_states.json || true
          git add high_risk_predictions.json || true
          git add false_positive_logged.json || true
          git add analytics.json || true
          git add ANALYTICS.md || true
          git add STATUS.md || true
          git diff --staged --quiet || \
            git commit -m "📊 Update game states and analytics [skip ci]" || true
          git pull --rebase origin main || true
          git push || echo "⚠️ WARNING: Push failed — game state may not persist to next run"

      - name: Commit analytics for skipped run
        if: steps.check_time.outputs.should_run == 'false'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add analytics.json || true
          git add ANALYTICS.md || true
          git add STATUS.md || true
          git diff --staged --quiet || \
            git commit -m "📊 Update analytics (skipped run) [skip ci]" || true
          git pull --rebase origin main || true
          git push || echo "⚠️ WARNING: Push failed — skipped run analytics may not persist"
